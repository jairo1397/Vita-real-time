<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>VITA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.20.0/axios.js"></script>
</head>

<body>
    <main>
        <div id="contenido1" style="background-image: url('img/fondovita.jpeg');">
            <img class="imagen-foto" id="foto-dinamica">
        </div>
    </main>

    <script>
        const apiUrl = `https://apialacooh.alacoohecuador.com/real-time/contents/VITA%20Y%20LA%20HOLANDESA/rotate`;

        axios.get(apiUrl)
            .then(response => {
                if (response.data && response.data.data) {
                    const data = response.data.data;
                    console.log(data)
                    // actualiza la imagen de la API en la derecha y el texto
                    document.getElementById('foto-dinamica').src = data.link;
                    document.getElementById('nombre-dinamico').textContent = data.description || 'Sin descripción';
                }
            })
            .catch(error => {
                console.error('Error al obtener los datos:', error);
            });
    </script>
</body>
</html>
